name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --group=dev --group=types --group=lint
      - name: Ruff check
        run: |
          uv run ruff check flatcraft tests
          uv run ruff format --check flatcraft tests
      - name: Mypy
        run: uv run mypy flatcraft
      - name: Pyright
        run: uv run pyright flatcraft
